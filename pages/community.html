<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conecta Fatec | Comunidade</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Segoe UI', 'Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body class="theme-light">
  <script>
    (function () {
      const themeKey = 'conecta_theme_mode';
      const fontFamilyKey = 'conecta_font_family';
      const fontSizeKey = 'conecta_font_size';
      const fontFamilies = {
        inter: 'Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
        system: 'system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
        serif: 'Georgia, "Times New Roman", serif',
        mono: '"Cascadia Code", "Fira Code", Consolas, monospace',
        rounded: '"Trebuchet MS", "Segoe UI", system-ui, sans-serif'
      };
      const fontSizes = { small: '14px', normal: '16px', large: '18px', xlarge: '20px' };
      const savedTheme = localStorage.getItem(themeKey);
      const resolvedTheme = savedTheme === 'dark' ? 'dark' : 'light';
      const fontFamily = fontFamilies[localStorage.getItem(fontFamilyKey)] || fontFamilies.inter;
      const fontSize = fontSizes[localStorage.getItem(fontSizeKey)] || fontSizes.normal;

      document.documentElement.classList.remove('theme-light', 'theme-dark');
      document.documentElement.classList.add('theme-' + resolvedTheme);

      function applyBodyPreferences() {
        if (!document.body) return;
        document.body.classList.remove('theme-light', 'theme-dark');
        document.body.classList.add('theme-' + resolvedTheme);
        document.body.style.setProperty('--app-font-family', fontFamily);
        document.body.style.setProperty('--app-font-size', fontSize);
      }

      applyBodyPreferences();
      document.addEventListener('DOMContentLoaded', applyBodyPreferences, { once: true });
    })();
  </script>
  <main class="feed-page">
    <div class="feed-layout">
      <aside class="sidebar desktop-sidebar">
        <a href="feed.html" class="sidebar-logo">
          <img src="../assets/img/logo-light.png" alt="Logo" class="sidebar-logo-img logo-light" />
          <img src="../assets/img/logo-dark.png" alt="Logo" class="sidebar-logo-img logo-dark" />
        </a>

        <nav class="sidebar-nav">
          <a href="feed.html" class="sidebar-link">Feed</a>
          <a href="profile.html" class="sidebar-link">Perfil</a>
          <a href="communities.html" class="sidebar-link active">Comunidades</a>
          <a href="friends.html" class="sidebar-link">Amizades</a>
          <a href="notifications.html" class="sidebar-link">Notificações</a>
          <a href="settings.html" class="sidebar-link">Configurações</a>
          <a href="about.html" class="sidebar-link">Sobre</a>
        </nav>
        <button class="new-post-btn" type="button" data-bs-toggle="modal" data-bs-target="#newCommunityPostModal">Postar na comunidade</button>

        <div class="sidebar-actions">
          <a href="profile.html" class="logged-user">
            <div class="user-avatar" id="sidebar-avatar">--</div>
            <div>
              <strong id="sidebar-name">Carregando...</strong>
              <span id="sidebar-username">@usuario</span>
            </div>
          </a>
        </div>
      </aside>

      <section class="feed-content community-page-content">
        <header class="community-page-hero">
          <div class="community-page-header">
            <button class="community-page-avatar profile-main-avatar" id="comm-avatar" type="button" data-photo-viewer="community" aria-label="Abrir foto da comunidade">--</button>
            <div class="community-page-info">
              <span class="feed-kicker">Comunidade</span>
              <h1 id="comm-name">Carregando...</h1>
              <p id="comm-desc">Buscando informações...</p>
              <div class="community-page-meta">
                <span id="comm-creator"></span>
                <span id="comm-members-count">0 participantes</span>
              </div>
            </div>
            <div class="d-flex flex-column gap-2">
              <button type="button" class="btn btn-primary" id="comm-action-btn" style="display:none;">Participar</button>
              <button type="button" class="btn btn-outline-danger" id="delete-community-btn" style="display:none;">Excluir</button>
            </div>
          </div>
        </header>

        <div class="community-page-layout">
          <section class="community-main">
            <article class="community-create-card" id="community-create-post-card">
              <div class="d-flex gap-3 align-items-start">
                <button class="form-control text-start text-muted community-post-trigger" data-bs-toggle="modal" data-bs-target="#newCommunityPostModal">
                  Compartilhe algo com esta comunidade...
                </button>
              </div>
            </article>

            <section class="community-posts-section">
              <section class="feed-control-card community-feed-control">
                <div class="feed-control-text">
                  <h2>Publicações da comunidade</h2>
                </div>

                <div class="feed-tabs" role="tablist">
                  <button class="feed-tab active" id="community-general-tab" type="button">Geral</button>
                  <button class="feed-tab" id="community-friends-tab" type="button">Amigos</button>
                </div>
              </section>

              <div id="community-posts-container" class="d-flex flex-column gap-4">
                <p class="text-center py-4 text-muted">Carregando posts...</p>
              </div>
            </section>
            
          </section>

          <aside class="community-side">
            <h2>Participantes</h2>
            <div id="community-members-container" class="community-side-text">Carregando participantes...</div>
          </aside>
        </div>
      </section>
    </div>
  </main>

  <div class="modal fade" id="newCommunityPostModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content post-modal-content">
        <div class="modal-header border-0">
          <h2 class="modal-title fs-5 fw-bold">Publicar na comunidade</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <textarea id="communityPostContent" class="form-control border-0 community-modal-textarea" rows="4" maxlength="200" placeholder="O que deseja compartilhar?" style="resize:none;outline:none;box-shadow:none;border-radius:12px;padding:16px;"></textarea>
          <p id="communityPostError" class="text-danger mt-2 small" style="display:none;"></p>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary px-4" id="publishCommunityPostBtn">Publicar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="editCommunityModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content post-modal-content">
        <div class="modal-header post-modal-header">
          <h2 class="modal-title fs-5">Editar comunidade</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body post-modal-body">
          <div class="community-form-area">
            <label for="editCommunityName">Nome da comunidade</label>
            <input type="text" id="editCommunityName" maxlength="50" />

            <label for="editCommunityBio">Descrição</label>
            <textarea id="editCommunityBio" rows="4" maxlength="150"></textarea>

            <label for="editCommunityPhoto">Foto da comunidade</label>
            <input type="file" id="editCommunityPhoto" accept="image/*" />
          </div>
          <p id="editCommunityError" class="text-danger mt-2 small" style="display:none;"></p>
        </div>
        <div class="modal-footer post-modal-footer">
          <button type="button" class="modal-cancel-btn" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="modal-publish-btn" id="saveCommunityBtn">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/post-ui.js"></script>
  <script src="../assets/js/community.js"></script>
</body>
</html>
