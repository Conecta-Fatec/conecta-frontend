<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conecta Fatec | Perfil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body class="theme-light">
  <script>
    (function () {
      const themeKey = 'conecta_theme_mode';
      const fontFamilyKey = 'conecta_font_family';
      const fontSizeKey = 'conecta_font_size';
      const fontFamilies = {
        inter: 'Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
        system: 'system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
        serif: 'Georgia, "Times New Roman", serif',
        mono: '"Cascadia Code", "Fira Code", Consolas, monospace',
        rounded: '"Trebuchet MS", "Segoe UI", system-ui, sans-serif'
      };
      const fontSizes = { small: '14px', normal: '16px', large: '18px', xlarge: '20px' };
      const savedTheme = localStorage.getItem(themeKey);
      const resolvedTheme = savedTheme === 'dark' ? 'dark' : 'light';
      const fontFamily = fontFamilies[localStorage.getItem(fontFamilyKey)] || fontFamilies.inter;
      const fontSize = fontSizes[localStorage.getItem(fontSizeKey)] || fontSizes.normal;

      document.documentElement.classList.remove('theme-light', 'theme-dark');
      document.documentElement.classList.add('theme-' + resolvedTheme);

      function applyBodyPreferences() {
        if (!document.body) return;
        document.body.classList.remove('theme-light', 'theme-dark');
        document.body.classList.add('theme-' + resolvedTheme);
        document.body.style.setProperty('--app-font-family', fontFamily);
        document.body.style.setProperty('--app-font-size', fontSize);
      }

      applyBodyPreferences();
      document.addEventListener('DOMContentLoaded', applyBodyPreferences, { once: true });
    })();
  </script>
  <main class="feed-page">
    <div class="feed-layout">
      <aside class="sidebar desktop-sidebar">
        <a href="feed.html" class="sidebar-logo">
          <img src="../assets/img/logo-light.png" alt="Logo" class="sidebar-logo-img logo-light" />
          <img src="../assets/img/logo-dark.png" alt="Logo" class="sidebar-logo-img logo-dark" />
        </a>

        <nav class="sidebar-nav">
          <a href="feed.html" class="sidebar-link">Feed</a>
          <a href="profile.html" class="sidebar-link active">Perfil</a>
          <a href="communities.html" class="sidebar-link">Comunidades</a>
          <a href="friends.html" class="sidebar-link">Amizades</a>
          <a href="#" class="sidebar-link">Notificações</a>
          <a href="settings.html" class="sidebar-link">Configurações</a>
        </nav>

        <button class="new-post-btn" type="button" onclick="window.location.href='feed.html'">Novo post</button>

        <div class="sidebar-actions">
          <a href="profile.html" class="logged-user">
            <div class="user-avatar" id="sidebar-avatar">--</div>
            <div>
              <strong id="sidebar-name">Carregando...</strong>
              <span id="sidebar-username">@usuario</span>
            </div>
          </a>
          <button class="logout-btn" type="button" data-logout>Sair</button>
        </div>
      </aside>

      <section class="feed-content community-page-content">
        <header class="community-page-hero">
          <div class="community-page-header">
            <div class="community-page-avatar" id="profile-avatar">--</div>
            <div class="community-page-info">
              <span class="feed-kicker">Meu perfil</span>
              <h1 id="profile-name">Carregando...</h1>
              <p id="profile-bio">Buscando informações do perfil...</p>
              <div class="community-page-meta">
                <span id="profile-nickname">@usuario</span>
                <span id="profile-course">Curso não informado</span>
                <span id="profile-friends-count">0 amigos</span>
              </div>
            </div>
            <button type="button" class="btn btn-outline-primary fw-bold" id="openEditProfileBtn">Editar perfil</button>
          </div>
        </header>

        <div class="community-page-layout">
          <section class="community-main profile-api-grid">
            <article class="profile-api-card">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="h5 fw-bold mb-0">Publicações</h2>
              </div>
              <div id="profile-posts-container" class="d-flex flex-column gap-3">
                <p class="text-muted">Carregando posts...</p>
              </div>
            </article>
          </section>

          <aside class="community-side">
            <section class="profile-api-card mb-3">
              <h2 class="h5 fw-bold mb-3">Comunidades criadas</h2>
              <div id="created-communities-container" class="d-flex flex-column gap-2"></div>
            </section>

            <section class="profile-api-card mb-3">
              <h2 class="h5 fw-bold mb-3">Amizades</h2>
              <div id="profile-friends-container" class="profile-friends-list"></div>
            </section>

            <section class="profile-api-card">
              <h2 class="h5 fw-bold mb-3">Comunidades que participo</h2>
              <div id="joined-communities-container" class="d-flex flex-column gap-2"></div>
            </section>
          </aside>
        </div>
      </section>
    </div>
  </main>

  <div class="modal fade" id="editProfileModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content post-modal-content">
        <div class="modal-header post-modal-header">
          <h2 class="modal-title fs-5">Editar perfil</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body post-modal-body">
          <div class="community-form-area">
            <label for="editFirstName">Nome</label>
            <input type="text" id="editFirstName" />

            <label for="editLastName">Sobrenome</label>
            <input type="text" id="editLastName" />

            <label for="editNickname">Nickname</label>
            <input type="text" id="editNickname" />

            <label for="editCourse">Curso</label>
            <select id="editCourse" class="form-select">
              <option value="">Selecione um curso</option>
              <option value="Automação Industrial">Automação Industrial</option>
              <option value="Desenvolvimento de Software Multiplataforma">Desenvolvimento de Software Multiplataforma</option>
              <option value="Fabricação Mecânica">Fabricação Mecânica</option>
              <option value="Manutenção Industrial">Manutenção Industrial</option>
              <option value="Mecânica: Processos de Soldagem">Mecânica: Processos de Soldagem</option>
              <option value="Refrigeração, Ventilação e Ar Condicionado">Refrigeração, Ventilação e Ar Condicionado</option>
            </select>

            <label for="editBio">Bio</label>
            <textarea id="editBio" rows="4" maxlength="150"></textarea>

            <label for="editPhoto">Foto de perfil</label>
            <input type="file" id="editPhoto" accept="image/*" />
          </div>
          <p id="editProfileError" class="text-danger mt-2 small" style="display:none;"></p>
        </div>
        <div class="modal-footer post-modal-footer">
          <button type="button" class="modal-cancel-btn" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="modal-publish-btn" id="saveProfileBtn">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/profile.js"></script>
</body>
</html>
