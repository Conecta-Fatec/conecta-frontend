<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conecta Fatec | Post</title>

    <script>
        if (!localStorage.getItem('access_token')) {
            window.location.href = '../index.html';
        }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" /> 
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Segoe UI', 'Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        };
    </script>
   
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body class="theme-light">
    <script>
        (function () {
            const themeKey = 'conecta_theme_mode';
            const resolvedTheme = localStorage.getItem(themeKey) === 'dark' ? 'dark' : 'light';
            document.documentElement.classList.add('theme-' + resolvedTheme);
            document.addEventListener('DOMContentLoaded', () => {
                document.body.classList.add('theme-' + resolvedTheme);
            }, { once: true });
        })();
    </script>

    <main class="feed-page">
        <div class="feed-layout">

            <aside class="sidebar desktop-sidebar">
                <a href="feed.html" class="sidebar-logo">
                    <img src="../assets/img/logo-light.png" alt="Logo Conecta Fatec"
                        class="sidebar-logo-img logo-light" />
                    <img src="../assets/img/logo-dark.png" alt="Logo Conecta Fatec"
                        class="sidebar-logo-img logo-dark" />
                </a>

                <nav class="sidebar-nav">
                    <a href="feed.html" class="sidebar-link">Feed</a>
                    <a href="profile.html" class="sidebar-link">Perfil</a>
                    <a href="communities.html" class="sidebar-link">Comunidades</a>
                    <a href="friends.html" class="sidebar-link">Amizades</a>
                    <a href="notifications.html" class="sidebar-link">Notificações</a>
                    <a href="settings.html" class="sidebar-link">Configurações</a>
                    <a href="about.html" class="sidebar-link">Sobre</a>
                </nav>

                <div class="sidebar-actions">
                    <a href="profile.html" class="logged-user">
                        <div class="user-avatar" id="sidebar-avatar">--</div>
                        <div>
                            <strong id="sidebar-name">Carregando...</strong>
                            <span id="sidebar-username">@usuario</span>
                        </div>
                    </a>
                </div>
            </aside>

            <section class="feed-content position-relative" style="padding-bottom: 100px;">

                <header class="single-post-header">
                    <button class="back-btn" onclick="history.back()" aria-label="Voltar">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
                        </svg>
                    </button>
                    <h1 class="fs-4 m-0 fw-bold">Post</h1>
                </header>

                <div id="main-post-container" class="single-post-view">
                    <p class="text-center text-muted py-4">Carregando publicação...</p>
                </div>

                <div id="post-comments-list" class="d-flex flex-column">
                </div>

            </section>
        </div>

        <div class="reply-bar-container">
            <div class="user-avatar" id="reply-avatar">--</div>
            <div class="reply-input-wrapper">
                <input type="text" id="reply-input" placeholder="Postar sua resposta" autocomplete="off" />
            </div>
            <button class="btn btn-primary rounded-pill px-4 fw-bold" id="send-reply-btn" disabled>Responder</button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/post-ui.js"></script>
    <script src="../assets/js/post.js"></script>
</body>

</html>
