<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conecta Fatec | Perfil público</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body class="theme-light">
  <script>
    (function () {
      const themeKey = 'conecta_theme_mode';
      const fontFamilyKey = 'conecta_font_family';
      const fontSizeKey = 'conecta_font_size';
      const fontFamilies = {
        inter: 'Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
        system: 'system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
        serif: 'Georgia, "Times New Roman", serif',
        mono: '"Cascadia Code", "Fira Code", Consolas, monospace',
        rounded: '"Trebuchet MS", "Segoe UI", system-ui, sans-serif'
      };
      const fontSizes = { small: '14px', normal: '16px', large: '18px', xlarge: '20px' };
      const savedTheme = localStorage.getItem(themeKey);
      const resolvedTheme = savedTheme === 'dark' ? 'dark' : 'light';
      const fontFamily = fontFamilies[localStorage.getItem(fontFamilyKey)] || fontFamilies.inter;
      const fontSize = fontSizes[localStorage.getItem(fontSizeKey)] || fontSizes.normal;

      document.documentElement.classList.remove('theme-light', 'theme-dark');
      document.documentElement.classList.add('theme-' + resolvedTheme);

      function applyBodyPreferences() {
        if (!document.body) return;
        document.body.classList.remove('theme-light', 'theme-dark');
        document.body.classList.add('theme-' + resolvedTheme);
        document.body.style.setProperty('--app-font-family', fontFamily);
        document.body.style.setProperty('--app-font-size', fontSize);
      }

      applyBodyPreferences();
      document.addEventListener('DOMContentLoaded', applyBodyPreferences, { once: true });
    })();
  </script>
  <main class="feed-page">
    <div class="feed-layout">
      <aside class="sidebar desktop-sidebar">
        <a href="feed.html" class="sidebar-logo">
          <img src="../assets/img/logo-light.png" alt="Logo" class="sidebar-logo-img logo-light" />
          <img src="../assets/img/logo-dark.png" alt="Logo" class="sidebar-logo-img logo-dark" />
        </a>

        <nav class="sidebar-nav">
          <a href="feed.html" class="sidebar-link">Feed</a>
          <a href="profile.html" class="sidebar-link">Perfil</a>
          <a href="communities.html" class="sidebar-link">Comunidades</a>
          <a href="friends.html" class="sidebar-link">Amizades</a>
          <a href="#" class="sidebar-link">Notificações</a>
          <a href="settings.html" class="sidebar-link">Configurações</a>
        </nav>

        <button class="new-post-btn" type="button" onclick="window.location.href='feed.html'">Novo post</button>

        <div class="sidebar-actions">
          <a href="profile.html" class="logged-user">
            <div class="user-avatar" id="sidebar-avatar">--</div>
            <div>
              <strong id="sidebar-name">Carregando...</strong>
              <span id="sidebar-username">@usuario</span>
            </div>
          </a>
          <button class="logout-btn" type="button" data-logout>Sair</button>
        </div>
      </aside>

      <section class="feed-content community-page-content">
        <header class="community-page-hero">
          <div class="community-page-header">
            <div class="community-page-avatar" id="public-avatar">--</div>
            <div class="community-page-info">
              <span class="feed-kicker">Perfil público</span>
              <h1 id="public-name">Carregando...</h1>
              <p id="public-bio">Buscando informações do perfil...</p>
              <div class="community-page-meta">
                <span id="public-nickname">@usuario</span>
                <span id="public-course">Curso não informado</span>
                <span id="public-friends-count">0 amigos</span>
              </div>
            </div>
            <button type="button" class="btn btn-primary fw-bold" id="friendActionBtn" style="display:none;">Adicionar</button>
          </div>
        </header>

        <div class="community-page-layout">
          <section class="community-main profile-api-grid">
            <article class="profile-api-card">
              <h2 class="h5 fw-bold mb-3">Publicações</h2>
              <div id="public-posts-container" class="d-flex flex-column gap-3">
                <p class="text-muted">Carregando posts...</p>
              </div>
            </article>
          </section>

          <aside class="community-side">
            <section class="profile-api-card mb-3">
              <h2 class="h5 fw-bold mb-3">Comunidades criadas</h2>
              <div id="public-created-communities" class="d-flex flex-column gap-2"></div>
            </section>
            <section class="profile-api-card">
              <h2 class="h5 fw-bold mb-3">Comunidades que participa</h2>
              <div id="public-joined-communities" class="d-flex flex-column gap-2"></div>
            </section>
          </aside>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/profileuser.js"></script>
</body>
</html>
