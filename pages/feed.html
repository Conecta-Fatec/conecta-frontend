<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conecta Fatec | Mural</title>

  <script>
    if (!localStorage.getItem('access_token')) {
      window.location.href = '../index.html';
    }
  </script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body class="theme-light">

  <button id="themeToggle" class="theme-toggle-btn page-theme-toggle" type="button"
    aria-label="Alternar tema">☽</button>

  <main class="feed-page">
    <div class="feed-layout">

      <aside class="sidebar desktop-sidebar">
        <a href="feed.html" class="sidebar-logo">
          <img src="../assets/img/logo-light.png" alt="Logo Conecta Fatec" class="sidebar-logo-img logo-light" />
          <img src="../assets/img/logo-dark.png" alt="Logo Conecta Fatec" class="sidebar-logo-img logo-dark" />
        </a>

        <nav class="sidebar-nav">
          <a href="feed.html" class="sidebar-link active">Feed</a>
          <a href="profile.html" class="sidebar-link">Perfil</a>
          <a href="communities.html" class="sidebar-link">Comunidades</a>
          <a href="friends.html" class="sidebar-link">Amizades</a>
          <a href="#" class="sidebar-link">Notificações</a>
          <a href="#" class="sidebar-link">Configurações</a>
        </nav>

        <button class="new-post-btn" type="button" data-bs-toggle="modal" data-bs-target="#newPostModal">
          Novo post
        </button>

        <div class="sidebar-actions">
          <a href="profile.html" class="logged-user">
          <div class="user-avatar" id="sidebar-avatar">U</div>
          <div>
            <strong id="sidebar-name">Carregando...</strong>
            <span id="sidebar-username">@usuario</span>
          </div>
        </a>
          <button class="logout-btn" type="button" data-logout>Sair</button>
        </div>
      </aside>

      <section class="feed-content">
        <header class="feed-header feed-hero">
          <div>
            <span class="feed-kicker">Conecta Fatec</span>
            <h1>Feed acadêmico</h1>
            <p>Acompanhe publicações e atualizações dos alunos.</p>
          </div>
        </header>

        <section class="feed-control-card">
          <div class="feed-control-text">
            <h2>Publicações</h2>
          </div>
          <div class="feed-tabs" role="tablist">
            <button class="feed-tab active" id="general-tab" type="button">Geral</button>
            <button class="feed-tab" id="friends-tab" type="button">Amigos</button>
          </div>
        </section>

        <div class="tab-content feed-tab-content">
          <div class="tab-pane fade show active" id="general-posts">
            <div class="posts-list" id="posts-container">
            </div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <div class="modal fade" id="newPostModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content post-modal-content">
        <div class="modal-header post-modal-header">
          <h2 class="modal-title fs-5">Criar novo post</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body post-modal-body">
          <div class="create-post-modal-area">
            <div class="user-avatar" id="modal-avatar">M</div>
            <textarea id="postContent" rows="5" maxlength="280" placeholder="O que você está pensando?"></textarea>
          </div>
        </div>
        <div class="modal-footer post-modal-footer">
          <button type="button" class="modal-cancel-btn" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="modal-publish-btn" id="publishBtn">Publicar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/feed.js"></script>
</body>
</html>
