<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conecta Fatec | Feed</title>

  <script>
    if (!localStorage.getItem('access_token')) {
      window.location.href = '../index.html';
    }
  </script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Segoe UI', 'Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body class="theme-light">
  <script>
    (function () {
      const themeKey = 'conecta_theme_mode';
      const fontFamilyKey = 'conecta_font_family';
      const fontSizeKey = 'conecta_font_size';
      const fontFamilies = {
        inter: 'Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
        system: 'system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
        serif: 'Georgia, "Times New Roman", serif',
        mono: '"Cascadia Code", "Fira Code", Consolas, monospace',
        rounded: '"Trebuchet MS", "Segoe UI", system-ui, sans-serif'
      };
      const fontSizes = { small: '14px', normal: '16px', large: '18px', xlarge: '20px' };
      const savedTheme = localStorage.getItem(themeKey);
      const resolvedTheme = savedTheme === 'dark' ? 'dark' : 'light';
      const fontFamily = fontFamilies[localStorage.getItem(fontFamilyKey)] || fontFamilies.inter;
      const fontSize = fontSizes[localStorage.getItem(fontSizeKey)] || fontSizes.normal;

      document.documentElement.classList.remove('theme-light', 'theme-dark');
      document.documentElement.classList.add('theme-' + resolvedTheme);

      function applyBodyPreferences() {
        if (!document.body) return;
        document.body.classList.remove('theme-light', 'theme-dark');
        document.body.classList.add('theme-' + resolvedTheme);
        document.body.style.setProperty('--app-font-family', fontFamily);
        document.body.style.setProperty('--app-font-size', fontSize);
      }

      applyBodyPreferences();
      document.addEventListener('DOMContentLoaded', applyBodyPreferences, { once: true });
    })();
  </script>
  <main class="feed-page">
    <div class="feed-layout">

      <aside class="sidebar desktop-sidebar">
        <a href="feed.html" class="sidebar-logo">
          <img src="../assets/img/logo-light.png" alt="Logo Conecta Fatec" class="sidebar-logo-img logo-light" />
          <img src="../assets/img/logo-dark.png" alt="Logo Conecta Fatec" class="sidebar-logo-img logo-dark" />
        </a>

        <nav class="sidebar-nav">
          <a href="feed.html" class="sidebar-link active">Feed</a>
          <a href="profile.html" class="sidebar-link">Perfil</a>
          <a href="communities.html" class="sidebar-link">Comunidades</a>
          <a href="friends.html" class="sidebar-link">Amizades</a>
          <a href="notifications.html" class="sidebar-link">Notificações</a>
          <a href="settings.html" class="sidebar-link">Configurações</a>
          <a href="about.html" class="sidebar-link">Sobre</a>
        </nav>

        <button class="new-post-btn" type="button" data-bs-toggle="modal" data-bs-target="#newPostModal">
          Novo post
        </button>

        <div class="sidebar-actions">
          <a href="profile.html" class="logged-user">
          <div class="user-avatar" id="sidebar-avatar">U</div>
          <div>
            <strong id="sidebar-name">Carregando...</strong>
            <span id="sidebar-username">@usuario</span>
          </div>
        </a>
        </div>
      </aside>

      <section class="feed-content">
        <header class="feed-header feed-hero feed-hero-actions">
          <div>
            <span class="feed-kicker">Feed</span>
            <h1>Feed acadêmico</h1>
            <p>Acompanhe publicações e atualizações dos alunos.</p>
          </div>
          <a href="notifications.html" class="notification-home-btn" aria-label="Notificações">
            <span>Notificações</span>
            <strong>0</strong>
          </a>
        </header>

        <article class="feed-create-card" id="feed-create-post-card" role="button" tabindex="0" data-bs-toggle="modal" data-bs-target="#newPostModal">
          <div class="feed-create-card-text">
            <strong>Criar publicação</strong>
            <span>Compartilhe uma ideia, dúvida ou atualização com os alunos.</span>
          </div>
          <button class="feed-create-card-btn" type="button">Postar</button>
        </article>

        <section class="feed-control-card">
          <div class="feed-control-text">
            <h2>Publicações</h2>
          </div>
          <div class="feed-tabs" role="tablist">
            <button class="feed-tab active" id="general-tab" type="button">Geral</button>
            <button class="feed-tab" id="friends-tab" type="button">Amigos</button>
          </div>
        </section>

        <div class="tab-content feed-tab-content">
          <div class="tab-pane fade show active" id="general-posts">
            <div class="posts-list" id="posts-container">
            </div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <div class="modal fade" id="newPostModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content post-modal-content">
        <div class="modal-header post-modal-header">
          <h2 class="modal-title fs-5">Criar novo post</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body post-modal-body">
          <div class="create-post-modal-area">
            <div class="user-avatar" id="modal-avatar">M</div>
            <textarea id="postContent" rows="5" maxlength="280" placeholder="O que você está pensando?"></textarea>
          </div>
        </div>
        <div class="modal-footer post-modal-footer">
          <button type="button" class="modal-cancel-btn" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="modal-publish-btn" id="publishBtn">Publicar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/post-ui.js"></script>
  <script src="../assets/js/feed.js"></script>
</body>
</html>
